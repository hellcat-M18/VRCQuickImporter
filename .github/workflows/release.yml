name: Build Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version variables
        id: vars
        run: |
          PKG_NAME="$(jq -r '.name' Packages/tool.hellcat.vrc-quick-importer/package.json)"
          VERSION="$(jq -r '.version' Packages/tool.hellcat.vrc-quick-importer/package.json)"
          TAG="v${VERSION}"
          ZIP_NAME="${PKG_NAME}-${VERSION}.zip"
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      - name: Update package.json url
        run: |
          jq --arg url "${{ steps.vars.outputs.zip_url }}" '.url = $url' \
            Packages/tool.hellcat.vrc-quick-importer/package.json > tmp.json
          mv tmp.json Packages/tool.hellcat.vrc-quick-importer/package.json

      - name: Build zip
        run: |
          cd Packages/tool.hellcat.vrc-quick-importer
          zip -r "../../${{ steps.vars.outputs.zip_name }}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "AGENTS/*" \
            -x "Tools~/WebView2Host/bin/*" \
            -x "Tools~/WebView2Host/obj/*" \
            -x "Tools~/WebView2Host/publish/*" \
            -x "*.pdb"

      - name: Upload zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vars.outputs.zip_name }}
